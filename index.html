<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Discord OAuth Callback</title>
<style>
body{font-family:sans-serif;background:#111827;color:#f9fafb;padding:24px;line-height:1.6}
code,pre,textarea{background:#0f172a;color:#e5e7eb;padding:10px;border-radius:10px;display:block;overflow:auto;width:100%;box-sizing:border-box}
textarea{min-height:120px;resize:vertical;border:1px solid #374151}
button{appearance:none;border:1px solid rgba(255,255,255,0.14);background:#1d4ed8;color:#fff;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}
button.secondary{background:#1f2937}
.box{max-width:880px;margin:0 auto;background:#1f2937;border:1px solid #374151;border-radius:16px;padding:20px}
.ok{color:#86efac}.warn{color:#fbbf24}.muted{color:#cbd5e1}.row{display:flex;flex-wrap:wrap;gap:12px;margin:14px 0}
</style>
</head>
<body>
<div class="box">
<h1>Discord OAuth Callback</h1>
<p>認証が終わると、このページに <strong>連携コード</strong> を作成します。ゲームへ戻って、<strong>ログイン設定 → Discord連携</strong> に貼り付けてください。</p>
<p class="warn">まずはこの別窓からゲームへの<strong>自動反映</strong>を試します。戻らない時だけ、下の連携コードを使ってください。</p>
<div class="row">
<button id="copyBtn" type="button">連携コードをコピー</button>
<button id="copyUrlBtn" class="secondary" type="button">URL 全体をコピー</button>
</div>
<p class="muted">ゲーム側では「連携コード」でも「この callback URL 全体」でも受け付けます。</p>
<textarea id="handoff" readonly>読み込み中…</textarea>
<pre id="out">読み込み中…</pre>
</div>
<script>
function base64UrlEncodeUtf8(text){const bytes=new TextEncoder().encode(String(text||''));let binary='';bytes.forEach((value)=>{binary+=String.fromCharCode(value);});return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/g,'');}
function buildFingerprint(text){const value=String(text||'');let hash=2166136261;for(let i=0;i<value.length;i+=1){hash^=value.charCodeAt(i);hash=Math.imul(hash,16777619);}return Math.abs(hash>>>0).toString(36);}
async function copyText(text){const value=String(text||'');if(!value) return false;try{if(navigator?.clipboard?.writeText){await navigator.clipboard.writeText(value);return true;}}catch(_){}try{const temp=document.createElement('textarea');temp.value=value;temp.setAttribute('readonly','readonly');temp.style.position='fixed';temp.style.left='-9999px';document.body.appendChild(temp);temp.select();const ok=document.execCommand('copy');document.body.removeChild(temp);return !!ok;}catch(_){return false;}}
async function fetchDiscordProfile(result){
  if(!result.access_token) return null;
  try {
    const response = await fetch('https://discord.com/api/v10/users/@me', { headers: { Authorization: `${result.token_type || 'Bearer'} ${result.access_token}` } });
    if (!response.ok) throw new Error(`Discord API ${response.status}`);
    return await response.json();
  } catch (_) {
    return null;
  }
}
const hash = window.location.hash || '';
const params = new URLSearchParams(hash.startsWith('#') ? hash.slice(1) : hash);
const oauthResult = {
  access_token: params.get('access_token') || '',
  token_type: params.get('token_type') || 'Bearer',
  expires_in: params.get('expires_in') || '',
  scope: params.get('scope') || '',
  state: params.get('state') || '',
  source: 'github_callback'
};
const handoff = document.getElementById('handoff');
const out = document.getElementById('out');
let currentHandoffCode = '';
function buildHandoffPayload(profile){
  const userId = String(profile?.id || '');
  return {
    discordUserId: userId,
    username: String(profile?.username || ''),
    globalName: String(profile?.global_name || ''),
    discriminator: String(profile?.discriminator || ''),
    avatar: String(profile?.avatar || ''),
    fingerprint: oauthResult.access_token ? buildFingerprint(oauthResult.access_token) : '',
    scope: oauthResult.scope || '',
    state: oauthResult.state || '',
    source: 'github_callback_v225'
  };
}
function updateUi(profile){
  const payload = buildHandoffPayload(profile);
  currentHandoffCode = payload.discordUserId || payload.fingerprint ? `DCOAUTH1.${base64UrlEncodeUtf8(JSON.stringify(payload))}` : '';
  handoff.value = currentHandoffCode || 'Discord 利用者情報を作れませんでした。認証をやり直してください。';
  const safePreview = Object.assign({}, payload, { note: 'access_token はページに表示しません。連携コードだけをゲームへ貼り付けてください。' });
  out.textContent = JSON.stringify(safePreview, null, 2);
  if (currentHandoffCode && window.opener && typeof window.opener.postMessage === 'function') {
    try {
      window.opener.postMessage({ action: 'crossplayDiscordOauthCallback', handoffCode: currentHandoffCode, oauthResult: payload }, '*');
      const auto = document.createElement('p');
      auto.id = 'autoState';
      auto.className = 'ok';
      auto.textContent = 'ゲーム側への自動反映を試しています。反映後はこの窓を閉じてください。';
      document.querySelector('.box').insertBefore(auto, handoff);
      setTimeout(() => { try { window.close(); } catch (_) {} }, 900);
    } catch (_) {}
  }
  copyText(currentHandoffCode || '').then((copied) => {
    const existing = document.getElementById('copiedState');
    if (existing) existing.remove();
    if (copied && currentHandoffCode) {
      const note = document.createElement('p');
      note.id = 'copiedState';
      note.className = 'ok';
      note.textContent = '連携コードはクリップボードへコピー済みです。ゲームへ戻って貼り付けてください。';
      document.querySelector('.box').insertBefore(note, handoff);
    }
  });
}
fetchDiscordProfile(oauthResult).then(updateUi).catch(() => updateUi(null));
document.getElementById('copyBtn').addEventListener('click', async () => { await copyText(currentHandoffCode || ''); });
document.getElementById('copyUrlBtn').addEventListener('click', async () => { await copyText(window.location.href); });
</script>
</body>
</html>
